# Local development database for LinguaSwap.
# Production runs on Supabase Postgres; this container mirrors it locally so dev matches prod.
#
#   docker compose up -d      # start Postgres (once per machine boot)
#   docker compose down       # stop it (data survives in the named volume)
#   docker compose down -v    # stop AND wipe the database
#
# The API reads ConnectionStrings:Default from appsettings.json, which points here:
#   Host=localhost;Port=5433;Database=linguaswap;Username=postgres;Password=postgres
#
# NOTE: host port is 5433 (not the default 5432) so this stays isolated from any other
# local Postgres you run (e.g. a separate LinguaSwapBackend project on 5432). The container
# still speaks 5432 internally; only the host mapping is 5433.
services:
  db:
    image: postgres:17
    container_name: linguaswap-claude-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: linguaswap
    ports:
      - "5433:5432"
    volumes:
      - linguaswap-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d linguaswap"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  linguaswap-pgdata:
